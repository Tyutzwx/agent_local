version: '3.8'

services:
  agent-control:
    build: .
    container_name: agent-control
    restart: always
    user: root
    ports:
      - "9002:9002"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      # 挂载算法组件的配置文件（路径已更新）
      - ../algorithm/docker-compose.yaml:/app/docker-compose.yaml
      - ../algorithm/test/config.cfg:/app/test/config.cfg
      - ../algorithm/images:/app/images
      - ../algorithm/tools:/app/tools
      - ../logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
    networks:
      - control-network

networks:
  control-network:
    driver: bridge
